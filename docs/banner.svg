<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="16" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.06" fill="#fff">
    <circle cx="50" cy="30" r="1.5"/><circle cx="90" cy="30" r="1.5"/><circle cx="130" cy="30" r="1.5"/><circle cx="170" cy="30" r="1.5"/><circle cx="210" cy="30" r="1.5"/>
    <circle cx="50" cy="60" r="1.5"/><circle cx="90" cy="60" r="1.5"/><circle cx="130" cy="60" r="1.5"/><circle cx="170" cy="60" r="1.5"/><circle cx="210" cy="60" r="1.5"/>
    <circle cx="590" cy="160" r="1.5"/><circle cx="630" cy="160" r="1.5"/><circle cx="670" cy="160" r="1.5"/><circle cx="710" cy="160" r="1.5"/><circle cx="750" cy="160" r="1.5"/>
    <circle cx="590" cy="190" r="1.5"/><circle cx="630" cy="190" r="1.5"/><circle cx="670" cy="190" r="1.5"/><circle cx="710" cy="190" r="1.5"/><circle cx="750" cy="190" r="1.5"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(70, 50)" filter="url(#glow)">
    <path d="M55 10 L95 25 L95 65 C95 90 75 108 55 118 C35 108 15 90 15 65 L15 25 Z"
          fill="none" stroke="url(#shield)" stroke-width="3" opacity="0.9"/>
    <path d="M55 18 L88 31 L88 65 C88 86 72 100 55 110 C38 100 22 86 22 65 L22 31 Z"
          fill="url(#shield)" opacity="0.15"/>
    <!-- Checkmark inside shield -->
    <path d="M38 62 L50 74 L72 48" fill="none" stroke="url(#shield)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="195" y="85" font-family="'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700" fill="#ffffff" filter="url(#shadow)">
    反诈守护 Skill
  </text>

  <!-- Subtitle -->
  <text x="195" y="120" font-family="'SF Pro Display', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#8892b0" letter-spacing="1">
    AI-Powered Anti-Fraud Guardian for Claude Code / Ducc
  </text>

  <!-- Accent line -->
  <rect x="195" y="135" width="120" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Level badges -->
  <g transform="translate(195, 155)">
    <!-- L1 -->
    <rect x="0" y="0" width="70" height="24" rx="12" fill="#f1c40f" opacity="0.2"/>
    <rect x="0" y="0" width="70" height="24" rx="12" fill="none" stroke="#f1c40f" stroke-width="1" opacity="0.6"/>
    <text x="35" y="16" font-family="monospace" font-size="11" fill="#f1c40f" text-anchor="middle" font-weight="600">🟡 L1</text>

    <!-- L2 -->
    <rect x="82" y="0" width="70" height="24" rx="12" fill="#e67e22" opacity="0.2"/>
    <rect x="82" y="0" width="70" height="24" rx="12" fill="none" stroke="#e67e22" stroke-width="1" opacity="0.6"/>
    <text x="117" y="16" font-family="monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">🟠 L2</text>

    <!-- L3 -->
    <rect x="164" y="0" width="70" height="24" rx="12" fill="#e94560" opacity="0.2"/>
    <rect x="164" y="0" width="70" height="24" rx="12" fill="none" stroke="#e94560" stroke-width="1" opacity="0.6"/>
    <text x="199" y="16" font-family="monospace" font-size="11" fill="#e94560" text-anchor="middle" font-weight="600">🔴 L3</text>
  </g>

  <!-- Right side decorative scan lines -->
  <g transform="translate(620, 40)" opacity="0.12" stroke="#e94560" stroke-width="1">
    <line x1="0" y1="0" x2="140" y2="0"/>
    <line x1="0" y1="12" x2="110" y2="12"/>
    <line x1="0" y1="24" x2="130" y2="24"/>
    <line x1="0" y1="36" x2="90" y2="36"/>
    <line x1="0" y1="48" x2="120" y2="48"/>
    <line x1="0" y1="60" x2="80" y2="60"/>
    <line x1="0" y1="72" x2="140" y2="72"/>
    <line x1="0" y1="84" x2="100" y2="84"/>
    <line x1="0" y1="96" x2="130" y2="96"/>
    <line x1="0" y1="108" x2="70" y2="108"/>
    <line x1="0" y1="120" x2="110" y2="120"/>
    <line x1="0" y1="132" x2="140" y2="132"/>
  </g>

  <!-- Scanning indicator dot -->
  <circle cx="625" cy="45" r="4" fill="#e94560" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
